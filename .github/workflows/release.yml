name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v3.0.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package version
        run: |
          node <<'NODE'
          const { version } = require("./package.json")
          const tag = process.env.RELEASE_TAG
          const tagVersion = tag.replace(/^v/, "")

          if (tagVersion !== version) {
            console.error(`Release tag ${tag} does not match package.json version ${version}`)
            process.exit(1)
          }
          NODE

      - name: Build extension
        run: bun run build

      - name: Package extension
        run: bun run package

      - name: Prepare release asset
        run: |
          mkdir -p release
          cp build/chrome-mv3-prod.zip "release/fmkorea-preview-${RELEASE_TAG}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fmkorea-preview-${{ env.RELEASE_TAG }}
          path: release/*.zip
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Fmkorea Preview ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release/*.zip
          fail_on_unmatched_files: true
